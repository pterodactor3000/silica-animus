name: Publish silica-animus

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://npm.pkg.github.com"
          scope: "@pterodactor3000"

      - run: npm ci

      - run: |
          node -e "const p=require('./package.json'); ['name','version'].forEach(k=>{if(!p[k])throw new Error(k+' missing')}); if(!p.publishConfig?.registry)throw new Error('publishConfig.registry missing')"

      - run: test -f skills/rites-of-code-review/SKILL.md

      - run: "grep -q '^name: rites-of-code-review' skills/rites-of-code-review/SKILL.md"
      - run: "grep -q '^description:' skills/rites-of-code-review/SKILL.md"

      - run: |
          SKILL=skills/rites-of-code-review/SKILL.md
          DIR=$(basename "$(dirname "$SKILL")")
          NAME=$(grep '^name:' "$SKILL" | head -1 | awk '{print $2}')
          test "$DIR" = "$NAME"

      - run: npm pack --dry-run

  publish:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://npm.pkg.github.com"
          scope: "@pterodactor3000"

      - run: npm ci

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
